<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twomi Business Strategy Simulator</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Dependencies -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #0f172a; }
        input[type='range'] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type='range']::-webkit-slider-runnable-track { width: 100%; height: 6px; cursor: pointer; background: #e2e8f0; border-radius: 10px; }
        input[type='range']::-webkit-slider-thumb { height: 18px; width: 18px; border-radius: 50%; background: #4f46e5; cursor: pointer; -webkit-appearance: none; margin-top: -6px; border: 2px solid #ffffff; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .card-shadow { box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1); }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;
        const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, Cell, PieChart, Pie, Legend } = Recharts;

        const IconInit = () => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); });
            return null;
        };

        const Card = ({ children, className = "" }) => (
            <div className={`bg-white rounded-[1.25rem] p-6 card-shadow border border-slate-200 ${className}`}>
                {children}
            </div>
        );

        const SliderGroup = ({ label, value, min, max, step, onChange, unit = "", color = "indigo" }) => (
            <div className="space-y-2 mb-4">
                <div className="flex justify-between items-center">
                    <span className="text-[11px] font-bold text-slate-500 uppercase tracking-wider">{label}</span>
                    <span className={`text-xs font-black text-${color}-600`}>{value.toLocaleString()}{unit}</span>
                </div>
                <input 
                    type="range" 
                    min={min} 
                    max={max} 
                    step={step} 
                    value={value} 
                    onChange={(e) => onChange(Number(e.target.value))} 
                    className="accent-indigo-600"
                />
            </div>
        );

        const App = () => {
            // --- 1. Acquisition (獲得) ---
            const [adBudget, setAdBudget] = useState(1000000); // 広告予算
            const [cpi, setCpi] = useState(500); // CPI (1円〜100,000円)

            // --- 2. Usage (利用量 / 原価計算用) ---
            const [chatMins, setChatMins] = useState(10);
            const [avatarCount, setAvatarCount] = useState(1);
            const [contentCount, setContentCount] = useState(5);
            const [liveMins, setLiveMins] = useState(5);
            const [radioMins, setRadioMins] = useState(20);

            // --- 3. Revenue (収益設定) ---
            const [adUnitPrice, setAdUnitPrice] = useState(50); // 広告収益単価/ユーザー
            const [creatorUnitPrice, setCreatorUnitPrice] = useState(100); // クリエイター単価
            const [creatorCount, setCreatorCount] = useState(10); // クリエイター数
            const [badgeUnitPrice, setBadgeUnitPrice] = useState(1500); // 認証バッジ単価
            const [badgeConvRate, setBadgeConvRate] = useState(2.5); // Paidコンバージョン率

            // --- Constants (指定原価) ---
            const COSTS = {
                chat: 60,       // 1分
                avatar: 80,     // 1体
                content: 120,   // 1本
                live: 90,       // 1分
                radio: 20       // 1分
            };

            const metrics = useMemo(() => {
                const totalUsers = Math.max(1, adBudget / cpi);
                
                // 機能別原価計算 (1ユーザーあたり)
                const costChat = chatMins * COSTS.chat;
                const costAvatar = avatarCount * COSTS.avatar;
                const costContent = contentCount * COSTS.content;
                const costLive = liveMins * COSTS.live;
                const costRadio = radioMins * COSTS.radio;
                
                const varCostPerUser = costChat + costAvatar + costContent + costLive + costRadio;
                const totalCogs = varCostPerUser * totalUsers;

                // 収益計算
                const revAd = adUnitPrice * totalUsers;
                const revCreator = creatorUnitPrice * totalUsers * creatorCount;
                const revBadge = badgeUnitPrice * totalUsers * (badgeConvRate / 100);
                const totalRevenue = revAd + revCreator + revBadge;

                const netProfit = totalRevenue - totalCogs - adBudget;

                return {
                    totalUsers,
                    totalRevenue,
                    totalCogs,
                    netProfit,
                    varCostPerUser,
                    revAd, revCreator, revBadge,
                    costData: [
                        { name: '会話', value: costChat * totalUsers },
                        { name: 'アバター作成', value: costAvatar * totalUsers },
                        { name: 'コンテンツ生成', value: costContent * totalUsers },
                        { name: 'ライブ', value: costLive * totalUsers },
                        { name: 'ラジオ', value: costRadio * totalUsers }
                    ],
                    revData: [
                        { name: '広告収益', value: revAd, color: '#6366f1' },
                        { name: 'クリエイター', value: revCreator, color: '#8b5cf6' },
                        { name: '認証バッジ', value: revBadge, color: '#ec4899' }
                    ]
                };
            }, [adBudget, cpi, chatMins, avatarCount, contentCount, liveMins, radioMins, adUnitPrice, creatorUnitPrice, creatorCount, badgeUnitPrice, badgeConvRate]);

            return (
                <div className="min-h-screen bg-slate-50 pb-20">
                    <IconInit />
                    <header className="bg-white border-b border-slate-200 sticky top-0 z-50">
                        <div className="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                <div className="w-9 h-9 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-200">
                                    <i data-lucide="cpu" className="text-white w-5 h-5"></i>
                                </div>
                                <h1 className="font-black text-slate-800 text-lg tracking-tight">TWOMI P&L SIMULATOR</h1>
                            </div>
                            <div className="text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em]">Strategic Decision Tool v9.0</div>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto px-6 pt-8 grid grid-cols-1 lg:grid-cols-12 gap-8">
                        
                        {/* 左：コントロールパネル */}
                        <div className="lg:col-span-4 space-y-6">
                            <Card>
                                <div className="flex items-center gap-2 mb-6">
                                    <i data-lucide="target" className="w-4 h-4 text-indigo-600"></i>
                                    <h3 className="text-xs font-black text-slate-800 uppercase tracking-widest">流入口・ユーザー獲得</h3>
                                </div>
                                <SliderGroup label="広告予算" value={adBudget} min={100000} max={50000000} step={100000} unit="円" onChange={setAdBudget} />
                                <SliderGroup label="CPI (獲得単価)" value={cpi} min={1} max={100000} step={1} unit="円" onChange={setCpi} color="rose" />
                                <div className="mt-4 p-3 bg-slate-50 rounded-xl border border-slate-100 flex justify-between items-center">
                                    <span className="text-[10px] font-bold text-slate-400">総獲得ユーザー数</span>
                                    <span className="text-sm font-black text-slate-800">{Math.floor(metrics.totalUsers).toLocaleString()} 人</span>
                                </div>
                            </Card>

                            <Card>
                                <div className="flex items-center gap-2 mb-6">
                                    <i data-lucide="layers" className="w-4 h-4 text-rose-600"></i>
                                    <h3 className="text-xs font-black text-slate-800 uppercase tracking-widest">機能別利用量（原価変動）</h3>
                                </div>
                                <SliderGroup label="会話 (分/月)" value={chatMins} min={0} max={600} step={10} unit="分" onChange={setChatMins} />
                                <SliderGroup label="アバター作成 (体/月)" value={avatarCount} min={0} max={10} step={1} unit="体" onChange={setAvatarCount} />
                                <SliderGroup label="コンテンツ生成 (本/月)" value={contentCount} min={0} max={100} step={5} unit="本" onChange={setContentCount} />
                                <SliderGroup label="ライブ配信 (分/月)" value={liveMins} min={0} max={120} step={5} unit="分" onChange={setLiveMins} />
                                <SliderGroup label="ラジオ配信 (分/月)" value={radioMins} min={0} max={300} step={10} unit="分" onChange={setRadioMins} />
                            </Card>

                            <Card>
                                <div className="flex items-center gap-2 mb-6">
                                    <i data-lucide="banknote" className="w-4 h-4 text-emerald-600"></i>
                                    <h3 className="text-xs font-black text-slate-800 uppercase tracking-widest">収益ロジック設定</h3>
                                </div>
                                <SliderGroup label="広告収益単価 / ユーザー" value={adUnitPrice} min={0} max={500} step={5} unit="円" onChange={setAdUnitPrice} />
                                <SliderGroup label="クリエイター単価" value={creatorUnitPrice} min={0} max={1000} step={10} unit="円" onChange={setCreatorUnitPrice} />
                                <SliderGroup label="アクティブクリエイター数" value={creatorCount} min={1} max={100} step={1} unit="名" onChange={setCreatorCount} />
                                <SliderGroup label="認証バッジ単価" value={badgeUnitPrice} min={500} max={10000} step={100} unit="円" onChange={setBadgeUnitPrice} />
                                <SliderGroup label="バッジ・コンバージョン率" value={badgeConvRate} min={0.1} max={20} step={0.1} unit="%" onChange={setBadgeConvRate} />
                            </Card>
                        </div>

                        {/* 右：分析結果 */}
                        <div className="lg:col-span-8 space-y-6">
                            
                            {/* KPIスコアボード */}
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                <Card className={`border-l-4 ${metrics.netProfit > 0 ? 'border-emerald-500' : 'border-rose-500'}`}>
                                    <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">最終営業損益</p>
                                    <h2 className={`text-2xl font-black ${metrics.netProfit > 0 ? 'text-emerald-600' : 'text-rose-600'}`}>
                                        ¥{Math.floor(metrics.netProfit).toLocaleString()}
                                    </h2>
                                    <p className="text-[9px] text-slate-400 mt-2">利益率: {((metrics.netProfit / metrics.totalRevenue) * 100).toFixed(1)}%</p>
                                </Card>
                                <Card className="border-l-4 border-indigo-500">
                                    <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">月間総収益</p>
                                    <h2 className="text-2xl font-black text-slate-800">
                                        ¥{Math.floor(metrics.totalRevenue).toLocaleString()}
                                    </h2>
                                    <p className="text-[9px] text-slate-400 mt-2">ユーザー単価: ¥{Math.floor(metrics.totalRevenue / metrics.totalUsers).toLocaleString()}</p>
                                </Card>
                                <Card className="border-l-4 border-rose-500">
                                    <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">総原価 (COGS + Ad)</p>
                                    <h2 className="text-2xl font-black text-slate-800">
                                        ¥{Math.floor(metrics.totalCogs + adBudget).toLocaleString()}
                                    </h2>
                                    <p className="text-[9px] text-slate-400 mt-2">獲得単価: ¥{Math.floor(cpi).toLocaleString()}</p>
                                </Card>
                            </div>

                            {/* 収益構成グラフ */}
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <Card>
                                    <h4 className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-6">収益内訳</h4>
                                    <div className="h-64">
                                        <ResponsiveContainer width="100%" height="100%">
                                            <BarChart data={metrics.revData} layout="vertical" margin={{ left: 20 }}>
                                                <XAxis type="number" hide />
                                                <YAxis dataKey="name" type="category" axisLine={false} tickLine={false} tick={{fontSize: 10, fontWeight: 700}} width={80} />
                                                <Tooltip formatter={(v) => `¥${v.toLocaleString()}`} cursor={{fill: '#f8fafc'}} />
                                                <Bar dataKey="value" radius={[0, 5, 5, 0]} barSize={30}>
                                                    {metrics.revData.map((entry, index) => (
                                                        <Cell key={`cell-${index}`} fill={entry.color} />
                                                    ))}
                                                </Bar>
                                            </BarChart>
                                        </ResponsiveContainer>
                                    </div>
                                </Card>

                                <Card>
                                    <h4 className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-6">機能別原価構成</h4>
                                    <div className="h-64">
                                        <ResponsiveContainer width="100%" height="100%">
                                            <PieChart>
                                                <Pie data={metrics.costData} dataKey="value" nameKey="name" cx="50%" cy="50%" innerRadius={50} outerRadius={70} paddingAngle={5}>
                                                    <Cell fill="#f43f5e" />
                                                    <Cell fill="#fb7185" />
                                                    <Cell fill="#fda4af" />
                                                    <Cell fill="#fecdd3" />
                                                    <Cell fill="#94a3b8" />
                                                </Pie>
                                                <Tooltip formatter={(v) => `¥${v.toLocaleString()}`} />
                                            </PieChart>
                                        </ResponsiveContainer>
                                    </div>
                                    <div className="flex flex-wrap justify-center gap-3 mt-2">
                                        {metrics.costData.map((c, i) => (
                                            <div key={i} className="flex items-center gap-1.5">
                                                <div className="w-2 h-2 rounded-full" style={{backgroundColor: ['#f43f5e', '#fb7185', '#fda4af', '#fecdd3', '#94a3b8'][i]}}></div>
                                                <span className="text-[9px] font-bold text-slate-500">{c.name}</span>
                                            </div>
                                        ))}
                                    </div>
                                </Card>
                            </div>

                            {/* ユニットエコノミクス詳細 */}
                            <Card className="bg-slate-900 text-white border-none shadow-2xl">
                                <div className="flex items-center gap-2 mb-6">
                                    <i data-lucide="zap" className="w-4 h-4 text-amber-400"></i>
                                    <h3 className="text-xs font-black text-indigo-300 uppercase tracking-widest">Unit Economics Analysis</h3>
                                </div>
                                <div className="grid grid-cols-2 md:grid-cols-4 gap-6">
                                    <div>
                                        <p className="text-[9px] text-slate-400 font-bold uppercase mb-1">1人あたり月間売上</p>
                                        <p className="text-lg font-black">¥{Math.floor(metrics.totalRevenue / metrics.totalUsers).toLocaleString()}</p>
                                    </div>
                                    <div>
                                        <p className="text-[9px] text-slate-400 font-bold uppercase mb-1">1人あたり月間原価</p>
                                        <p className="text-lg font-black text-rose-400">¥{Math.floor(metrics.varCostPerUser).toLocaleString()}</p>
                                    </div>
                                    <div>
                                        <p className="text-[9px] text-slate-400 font-bold uppercase mb-1">限界利益 / ユーザー</p>
                                        <p className="text-lg font-black text-emerald-400">¥{Math.floor((metrics.totalRevenue / metrics.totalUsers) - metrics.varCostPerUser).toLocaleString()}</p>
                                    </div>
                                    <div>
                                        <p className="text-[9px] text-slate-400 font-bold uppercase mb-1">損益分岐CPI</p>
                                        <p className="text-lg font-black text-amber-400">¥{Math.floor(metrics.totalRevenue / metrics.totalUsers - metrics.varCostPerUser).toLocaleString()}</p>
                                    </div>
                                </div>
                                <div className="mt-8 pt-6 border-t border-white/10">
                                    <p className="text-[11px] leading-relaxed text-slate-400 italic">
                                        現状のシミュレーションでは、1ユーザーを獲得するために許容できるコスト（CPIの上限）は 
                                        <span className="text-white font-bold ml-1">¥{Math.floor(metrics.totalRevenue / metrics.totalUsers - metrics.varCostPerUser).toLocaleString()}</span> です。
                                        これを超えると、ユーザーが増えるほど赤字が拡大します。
                                    </p>
                                </div>
                            </Card>

                        </div>
                    </main>

                    <footer className="max-w-7xl mx-auto px-6 mt-16 py-8 border-t border-slate-200 text-center">
                        <p className="text-[10px] font-black text-slate-300 uppercase tracking-[0.5em]">Twomi Strategic Simulator v9.0 - Precise P&L Engine</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
