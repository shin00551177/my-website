<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twomi Business Simulator v11</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Dependencies -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #0f172a; }
        input[type='range'] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type='range']::-webkit-slider-runnable-track { width: 100%; height: 6px; cursor: pointer; background: #e2e8f0; border-radius: 10px; }
        input[type='range']::-webkit-slider-thumb { height: 18px; width: 18px; border-radius: 50%; background: #4f46e5; cursor: pointer; -webkit-appearance: none; margin-top: -6px; border: 2px solid #ffffff; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        const App = () => {
            // 安全にRechartsコンポーネントを取得
            const Recharts = window.Recharts || {};
            const { BarChart, Bar, XAxis, YAxis, Tooltip, ResponsiveContainer, Cell, PieChart, Pie } = Recharts;

            // --- 1. 獲得（Acquisition） ---
            const [adBudget, setAdBudget] = useState(1000000); 
            const [cpi, setCpi] = useState(500); // 1円 〜 100,000円

            // --- 2. 利用量（Usage）と指定原価 ---
            const [chatMins, setChatMins] = useState(10);     // 会話: 60円/分
            const [avatarCount, setAvatarCount] = useState(1); // アバター作成: 80円/体
            const [contentCount, setContentCount] = useState(5); // コンテンツ生成: 120円/本
            const [liveMins, setLiveMins] = useState(5);      // ライブ: 90円/分
            const [radioMins, setRadioMins] = useState(20);    // ラジオ: 20円/分

            // --- 3. 収益源（Revenue） ---
            const [adUnitPrice, setAdUnitPrice] = useState(50);      // 広告収益単価
            const [creatorUnitPrice, setCreatorUnitPrice] = useState(100); // クリエイター単価
            const [creatorCount, setCreatorCount] = useState(10);    // クリエイター数
            const [badgeUnitPrice, setBadgeUnitPrice] = useState(1500); // 認証バッジ単価
            const [badgeConvRate, setBadgeConvRate] = useState(2.5);  // バッジCV率

            // 原価定数
            const COST_PER_UNIT = { chat: 60, avatar: 80, content: 120, live: 90, radio: 20 };

            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, []);

            const metrics = useMemo(() => {
                const totalUsers = Math.max(1, adBudget / cpi);
                
                // 機能別原価計算（ユーザー数 × 利用量 × 単価）
                const cChat = chatMins * COST_PER_UNIT.chat * totalUsers;
                const cAvatar = avatarCount * COST_PER_UNIT.avatar * totalUsers;
                const cContent = contentCount * COST_PER_UNIT.content * totalUsers;
                const cLive = liveMins * COST_PER_UNIT.live * totalUsers;
                const cRadio = radioMins * COST_PER_UNIT.radio * totalUsers;
                
                const totalCogs = cChat + cAvatar + cContent + cLive + cRadio;
                const varCostPerUser = totalCogs / totalUsers;

                // 収益計算
                const revAd = adUnitPrice * totalUsers;
                const revCreator = creatorUnitPrice * totalUsers * creatorCount;
                const revBadge = badgeUnitPrice * totalUsers * (badgeConvRate / 100);
                const totalRevenue = revAd + revCreator + revBadge;

                const netProfit = totalRevenue - totalCogs - adBudget;

                return {
                    totalUsers, totalRevenue, totalCogs, netProfit, varCostPerUser,
                    revAd, revCreator, revBadge,
                    costData: [
                        { name: '会話', value: cChat, color: '#f43f5e' },
                        { name: 'アバター', value: cAvatar, color: '#fb7185' },
                        { name: 'コンテンツ', value: cContent, color: '#fda4af' },
                        { name: 'ライブ', value: cLive, color: '#fecdd3' },
                        { name: 'ラジオ', value: cRadio, color: '#94a3b8' }
                    ],
                    revData: [
                        { name: '広告収益', value: revAd, color: '#6366f1' },
                        { name: 'クリエイター', value: revCreator, color: '#8b5cf6' },
                        { name: '認証バッジ', value: revBadge, color: '#ec4899' }
                    ]
                };
            }, [adBudget, cpi, chatMins, avatarCount, contentCount, liveMins, radioMins, adUnitPrice, creatorUnitPrice, creatorCount, badgeUnitPrice, badgeConvRate]);

            const formatYen = (v) => "¥" + Math.floor(v).toLocaleString();

            return (
                <div className="min-h-screen p-4 md:p-8 bg-slate-50">
                    <header className="max-w-7xl mx-auto mb-8 flex flex-col md:flex-row md:items-center justify-between gap-4">
                        <div className="flex items-center gap-3">
                            <div className="bg-indigo-600 p-2 rounded-xl text-white shadow-lg shadow-indigo-200">
                                <i data-lucide="bar-chart-3" className="w-6 h-6"></i>
                            </div>
                            <h1 className="text-xl font-black tracking-tight text-slate-800">TWOMI SIMULATOR v11</h1>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
                        {/* 設定エリア */}
                        <div className="lg:col-span-4 space-y-6">
                            <section className="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm">
                                <h2 className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-6 flex items-center gap-2">
                                    <i data-lucide="target" className="w-3 h-3 text-indigo-500"></i> ユーザー獲得
                                </h2>
                                <div className="space-y-6">
                                    <div className="space-y-2">
                                        <div className="flex justify-between text-xs font-bold text-slate-600"><span>広告予算</span><span>{formatYen(adBudget)}</span></div>
                                        <input type="range" min="100000" max="50000000" step="100000" value={adBudget} onChange={e => setAdBudget(Number(e.target.value))} />
                                    </div>
                                    <div className="space-y-2">
                                        <div className="flex justify-between text-xs font-bold text-slate-600"><span>CPI (獲得単価)</span><span className="text-rose-500">{formatYen(cpi)}</span></div>
                                        <input type="range" min="1" max="100000" step="1" value={cpi} onChange={e => setCpi(Number(e.target.value))} />
                                    </div>
                                    <div className="pt-4 border-t border-slate-100 flex justify-between items-center text-[10px] font-bold text-slate-400 uppercase">
                                        <span>獲得ユーザー数</span>
                                        <span className="text-lg font-black text-indigo-600">{Math.floor(metrics.totalUsers).toLocaleString()} 人</span>
                                    </div>
                                </div>
                            </section>

                            <section className="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm">
                                <h2 className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-6 flex items-center gap-2">
                                    <i data-lucide="cpu" className="w-3 h-3 text-rose-500"></i> 機能別利用量（原価）
                                </h2>
                                <div className="space-y-4">
                                    {[
                                        { label: "会話 (分/月)", val: chatMins, set: setChatMins, max: 600 },
                                        { label: "アバター作成 (体/月)", val: avatarCount, set: setAvatarCount, max: 20 },
                                        { label: "コンテンツ生成 (本/月)", val: contentCount, set: setContentCount, max: 100 },
                                        { label: "ライブ配信 (分/月)", val: liveMins, set: setLiveMins, max: 300 },
                                        { label: "ラジオ配信 (分/月)", val: radioMins, set: setRadioMins, max: 600 }
                                    ].map((item, i) => (
                                        <div key={i} className="space-y-1">
                                            <div className="flex justify-between text-[10px] font-bold text-slate-500 uppercase"><span>{item.label}</span><span>{item.val}</span></div>
                                            <input type="range" min="0" max={item.max} value={item.val} onChange={e => item.set(Number(e.target.value))} />
                                        </div>
                                    ))}
                                </div>
                            </section>

                            <section className="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm">
                                <h2 className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-6 flex items-center gap-2">
                                    <i data-lucide="banknote" className="w-3 h-3 text-emerald-500"></i> 収益ロジック設定
                                </h2>
                                <div className="space-y-4">
                                    <div className="space-y-1">
                                        <div className="flex justify-between text-[10px] font-bold text-slate-500"><span>広告単価 / ユーザー</span><span>¥{adUnitPrice}</span></div>
                                        <input type="range" min="0" max="1000" step="10" value={adUnitPrice} onChange={e => setAdUnitPrice(Number(e.target.value))} />
                                    </div>
                                    <div className="space-y-1">
                                        <div className="flex justify-between text-[10px] font-bold text-slate-500"><span>クリエイター単価</span><span>¥{creatorUnitPrice}</span></div>
                                        <input type="range" min="0" max="2000" step="50" value={creatorUnitPrice} onChange={e => setCreatorUnitPrice(Number(e.target.value))} />
                                    </div>
                                    <div className="space-y-1">
                                        <div className="flex justify-between text-[10px] font-bold text-slate-500"><span>クリエイター数</span><span>{creatorCount}人</span></div>
                                        <input type="range" min="1" max={100} value={creatorCount} onChange={e => setCreatorCount(Number(e.target.value))} />
                                    </div>
                                    <div className="space-y-1">
                                        <div className="flex justify-between text-[10px] font-bold text-slate-500"><span>バッジ単価</span><span>¥{badgeUnitPrice}</span></div>
                                        <input type="range" min="500" max="10000" step="100" value={badgeUnitPrice} onChange={e => setBadgeUnitPrice(Number(e.target.value))} />
                                    </div>
                                    <div className="space-y-1">
                                        <div className="flex justify-between text-[10px] font-bold text-slate-500"><span>バッジ転換率</span><span>{badgeConvRate}%</span></div>
                                        <input type="range" min="0.1" max="30" step="0.1" value={badgeConvRate} onChange={e => setBadgeConvRate(Number(e.target.value))} />
                                    </div>
                                </div>
                            </section>
                        </div>

                        {/* 分析結果エリア */}
                        <div className="lg:col-span-8 space-y-6">
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                <div className={`p-6 rounded-[2rem] shadow-sm border-l-8 ${metrics.netProfit > 0 ? 'bg-emerald-50 border-emerald-500 text-emerald-900' : 'bg-rose-50 border-rose-500 text-rose-900'}`}>
                                    <p className="text-[10px] font-black uppercase tracking-widest opacity-60 mb-2">月間営業利益</p>
                                    <p className="text-2xl font-black">{formatYen(metrics.netProfit)}</p>
                                </div>
                                <div className="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-200">
                                    <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">月間総収益</p>
                                    <p className="text-2xl font-black text-slate-800">{formatYen(metrics.totalRevenue)}</p>
                                </div>
                                <div className="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-200">
                                    <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">総原価(AI+広告費)</p>
                                    <p className="text-2xl font-black text-slate-800">{formatYen(metrics.totalCogs + adBudget)}</p>
                                </div>
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <section className="bg-white p-8 rounded-[2rem] border border-slate-200">
                                    <h3 className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-8">収益構成比率</h3>
                                    <div className="h-64">
                                        <ResponsiveContainer width="100%" height="100%">
                                            <BarChart data={metrics.revData} layout="vertical" margin={{ left: 20 }}>
                                                <XAxis type="number" hide />
                                                <YAxis dataKey="name" type="category" axisLine={false} tickLine={false} tick={{fontSize: 10, fontWeight: 700}} width={80} />
                                                <Tooltip formatter={v => formatYen(v)} cursor={{fill: '#f8fafc'}} />
                                                <Bar dataKey="value" radius={[0, 4, 4, 0]} barSize={25}>
                                                    {metrics.revData.map((entry, index) => (
                                                        <Cell key={index} fill={entry.color} />
                                                    ))}
                                                </Bar>
                                            </BarChart>
                                        </ResponsiveContainer>
                                    </div>
                                </section>

                                <section className="bg-white p-8 rounded-[2rem] border border-slate-200">
                                    <h3 className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-8 text-center">機能別原価内訳</h3>
                                    <div className="h-64">
                                        <ResponsiveContainer width="100%" height="100%">
                                            <PieChart>
                                                <Pie data={metrics.costData} dataKey="value" nameKey="name" cx="50%" cy="50%" innerRadius={50} outerRadius={75} paddingAngle={4}>
                                                    {metrics.costData.map((entry, index) => (
                                                        <Cell key={index} fill={entry.color} />
                                                    ))}
                                                </Pie>
                                                <Tooltip formatter={v => formatYen(v)} />
                                            </PieChart>
                                        </ResponsiveContainer>
                                    </div>
                                </section>
                            </div>

                            <section className="bg-slate-900 rounded-[2.5rem] p-8 text-white shadow-2xl">
                                <div className="flex items-center gap-3 mb-8 text-amber-400">
                                    <i data-lucide="zap" className="w-5 h-5"></i>
                                    <h3 className="text-xs font-black uppercase tracking-[0.2em]">Strategic Unit Economics</h3>
                                </div>
                                <div className="grid grid-cols-2 lg:grid-cols-4 gap-8">
                                    <div>
                                        <p className="text-[9px] text-slate-400 font-bold uppercase mb-1">ARPU (月間単価)</p>
                                        <p className="text-xl font-black">¥{Math.floor(metrics.totalRevenue / metrics.totalUsers).toLocaleString()}</p>
                                    </div>
                                    <div>
                                        <p className="text-[9px] text-slate-400 font-bold uppercase mb-1">AI原価 / ユーザー</p>
                                        <p className="text-xl font-black text-rose-400">¥{Math.floor(metrics.varCostPerUser).toLocaleString()}</p>
                                    </div>
                                    <div>
                                        <p className="text-[9px] text-slate-400 font-bold uppercase mb-1">限界利益 / ユーザー</p>
                                        <p className="text-xl font-black text-emerald-400">¥{Math.floor((metrics.totalRevenue / metrics.totalUsers) - metrics.varCostPerUser).toLocaleString()}</p>
                                    </div>
                                    <div>
                                        <p className="text-[9px] text-slate-400 font-bold uppercase mb-1">損益分岐CPI (上限)</p>
                                        <p className="text-xl font-black text-amber-400">¥{Math.floor(metrics.totalRevenue / metrics.totalUsers - metrics.varCostPerUser).toLocaleString()}</p>
                                    </div>
                                </div>
                            </section>
                        </div>
                    </main>
                </div>
            );
        };

        // DOMの読み込み完了を待ってから実行
        window.addEventListener('load', () => {
            const rootElement = document.getElementById('root');
            if (rootElement) {
                const root = ReactDOM.createRoot(rootElement);
                root.render(<App />);
            }
        });
    </script>
</body>

</html>
